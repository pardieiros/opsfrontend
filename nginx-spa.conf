server {
    listen 80;
    server_name plastic.floow.pt;
    
    # Configuração para o frontend React
    location /ops/ {
        alias /var/www/html/opsfinal/dist/;
        try_files $uri $uri/ /ops/index.html;
        
        # Headers para cache de assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Configuração para a API Django
    location /api/ {
        proxy_pass https://plastic.floow.pt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Redirecionar raiz para /ops/
    location = / {
        return 301 /ops/;
    }
} 