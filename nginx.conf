user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # HTTP → HTTPS for all domains
    server {
        listen 80;
        server_name
            plasticemployers.duckdns.org
            serverplasticemployers.duckdns.org
            filesplasticemployers.duckdns.org;

        # ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 1) Portal Frontend
    server {
        listen 443 ssl http2;
        server_name plasticemployers.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/plasticemployers.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/plasticemployers.duckdns.org/privkey.pem;
        client_max_body_size 100m;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root  /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri /index.html;
        }
        location /static/admin/ {
            alias       /var/www/django_static/admin/;
            expires     max;
            access_log  off;
        }
        location /static/ {
            alias       /usr/share/nginx/html/static/;
            expires     max;
            access_log  off;
        }

        location ^~ /admin/ {
            proxy_pass         http://django-backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass         http://django-backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /media/ {
            alias       /mnt/media/;
            autoindex   on;
        }

        location ~ /\.(env|git) {
            deny         all;
            access_log   off;
            log_not_found off;
        }

        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
    }

    # 2) Portainer
    server {
        listen 443 ssl http2;
        server_name serverplasticemployers.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/serverplasticemployers.duckdns.org/fullchain1.pem;
        ssl_certificate_key /etc/letsencrypt/live/serverplasticemployers.duckdns.org/privkey1.pem;

        location / {
            proxy_pass         http://portainer:9000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # 3) pgAdmin
    server {
        listen 443 ssl http2;
        server_name filesplasticemployers.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/filesplasticemployers.duckdns.org/fullchain1.pem;
        ssl_certificate_key /etc/letsencrypt/live/filesplasticemployers.duckdns.org/privkey1.pem;

        location / {
            proxy_pass         http://pgadmin:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # 4) Secondary Frontend
    server {
        listen 443 ssl http2;
        server_name plastic.floow.pt;

        ssl_certificate     /etc/letsencrypt/live/plastic.floow.pt/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/plastic.floow.pt/privkey.pem;
        client_max_body_size 100m;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root  /usr/share/nginx/html2;
        index index.html;

        # Serve manifest and favicon
        location = /manifest.json {
            root  /usr/share/nginx/html2;
            try_files $uri =404;
            add_header Content-Type application/json;
        }

        location = /favicon.png {
            root  /usr/share/nginx/html2;
            try_files $uri =404;
        }

        # Serve static assets with hash
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|mjs)$ {
            root /usr/share/nginx/html2;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Serve assets directory specifically
        location ^~ /assets/ {
            root /usr/share/nginx/html2;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback for all routes
        location / {
            root  /usr/share/nginx/html2;
            index index.html;
            try_files $uri $uri/ /index.html;
        }


        location /static/admin/ {
            alias       /var/www/django_static/admin/;
            expires     max;
            access_log  off;
        }
        location ^~ /admin/ {
            proxy_pass         http://django-backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
        location /api/ {
            proxy_pass         http://django-backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
        location /media/ {
            alias       /mnt/media/;
            autoindex   on;
        }
        location ~ /\.(env|git) {
            deny         all;
            access_log   off;
            log_not_found off;
        }

        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
    }
}
